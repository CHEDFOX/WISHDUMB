<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>WISHDUMB</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="brand">WISHDUMB</div>
      <nav>
        <a href="/">Home</a>
        <a href="talk.html">Talk</a>
        <a href="about.html">About</a>
      </nav>
    </header>

    <main>
      <div class="landing-container">
        <!-- You can add a subtle title here if you want -->
        <!-- <h1 class="landing-title">WISHDUMB</h1> -->

        <a href="talk.html" id="comeCloserBtn" class="come-near-btn">
          <span class="arrow">→</span>
          <span class="btn-label">COME CLOSER</span>
        </a>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const btn = document.getElementById("comeCloserBtn");
        if (!btn) return;

        btn.addEventListener("click", (e) => {
          e.preventDefault();
          if (btn.classList.contains("animating")) return;

          btn.classList.add("animating");

          // After the arrow + text animation, go to Talk page
          setTimeout(() => {
            window.location.href = "talk.html";
          }, 450);
        });
      });
    </script>
  </body>
</html>
